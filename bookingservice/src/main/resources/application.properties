#/api/v1/inventory/event/{eventId}

server.port=8081
inventory.service.url=http://localhost:8080/api/v1/inventory

#MySQL Database Configuration
spring.datasource.url= jdbc:mysql://localhost:3307/ticketing
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

#Kafka Connection Details
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=booking
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

#<dependency>
#<groupId>com.fasterxml.jackson.core</groupId>
#<artifactId>jackson-databind</artifactId>
#</dependency>

#OpenAPI Documenation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


#Url for docs http://localhost:8081/v3/api-docs